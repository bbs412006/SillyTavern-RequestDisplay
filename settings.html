<div class="extension_settings" id="request_display_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Request Display</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label">
                <input id="req_display_enabled" type="checkbox" />
                <span>启用请求悬浮条</span>
            </label>
            <label class="checkbox_label">
                <input id="req_display_mini" type="checkbox" />
                <span>默认开启极简模式（只显示图标）</span>
            </label>
            <div class="menu_button" id="req_display_reset_pos" style="width: fit-content; display: inline-block; padding: 6px 12px; margin: 10px 0; text-align: center;">重置悬浮条位置</div>
            <br>
            <small>提示：在页面底部可以直接点击悬浮条主体切换极简模式，下拉可查看历史记录。拖拽条体可移动位置。</small>
        </div>
    </div>
</div>
